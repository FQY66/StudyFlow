sf:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    host: localhost
    port: 3306
    database: study_flow
    url: jdbc:mysql://${sf.datasource.host}:${sf.datasource.port}/${sf.datasource.database}?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true

spring:
  servlet:
    multipart:
      max-file-size: 5MB          # 单个文件最大大小
      max-request-size: 50MB      # 单次请求最大大小
